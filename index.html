<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Vogelstimmen Trainer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Poppins',sans-serif;
text-align:center;
background:#f0f0f0;
}

#startScreen{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:70px;

background-image:url("Startseite.png");
background-size:cover;
background-position:center;
}

.startButton{
font-size:60px;
font-weight:700;
color:white;
padding:40px 110px;
border-radius:30px;
border:none;
cursor:pointer;
box-shadow:0 12px 0 rgba(0,0,0,0.5),0 18px 35px rgba(0,0,0,0.4);
}

.learnBtn{background:linear-gradient(#2ecc71,#1e8449);}
.quizBtn{background:linear-gradient(#3498db,#1f618d);}
.expertBtn{background:linear-gradient(#f39c12,#d35400);}

#game{
display:none;
padding-top:20px;
}

.bigButton{
font-size:34px;
font-weight:700;
padding:22px 45px;
border-radius:18px;
border:none;
background:#444;
color:white;
cursor:pointer;
margin:15px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
width:92%;
margin:auto;
margin-top:30px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
cursor:pointer;
}

.card img{
width:100%;
height:200px;
object-fit:contain;
}

.name{
font-size:26px;
font-weight:700;
margin-top:10px;
}

.expertButton{
font-size:34px;
font-weight:700;
padding:40px;
border-radius:20px;
border:none;
background:#e67e22;
color:white;
cursor:pointer;
}

.correct{
background:#2ecc71 !important;
color:white;
}

.wrong{
background:#e74c3c !important;
color:white;
}

#points{
font-size:60px;
font-weight:700;
}

.progressContainer{
width:90%;
height:70px;
background:#ddd;
border-radius:40px;
margin:20px auto;
overflow:hidden;
}

.progressBar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00c6ff,#0072ff);
}

#info{
font-size:38px;
height:60px;
}

#correctBirdBox{
display:none;
margin-top:20px;
}

#correctBirdBox img{
width:260px;
border-radius:20px;
}

#endScreen{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("Startseite.png");
background-size:cover;
background-position:center;
justify-content:center;
align-items:center;
flex-direction:column;
}

.resultBox{
background:rgba(0,0,0,0.65);
padding:50px;
border-radius:25px;
color:white;
}

#finalScore{
font-size:90px;
}

.highscore{
background:white;
padding:40px;
border-radius:20px;
margin-top:30px;
font-size:34px;
}

</style>

</head>

<body>

<div id="startScreen">

<button class="startButton learnBtn" onclick="startGame('learn')">Lernen</button> <button class="startButton quizBtn" onclick="startGame('quiz')">Quiz</button> <button class="startButton expertBtn" onclick="startGame('expert')">Expertenmodus</button>

</div>

<div id="game">

<button class="bigButton" onclick="goBack()">⬅ Zurück</button>

<div id="quizElements">

<div id="points">Punkte: 0 / 15</div>

<div class="progressContainer">
<div class="progressBar" id="progressBar"></div>
</div>

<button class="bigButton" onclick="repeatSound()">🔁 Vogelruf wiederholen</button>

<div id="info">🔊 Höre den Vogelruf</div>

<div id="correctBirdBox">
<img id="correctBirdImage">
<div id="correctBirdName"></div>
</div>

</div>

<div class="container" id="birdContainer"></div>

</div>

<div id="endScreen">

<div class="resultBox">
<div id="finalScore"></div>
</div>

<input id="nameInput" placeholder="Dein Name">

<button id="saveBtn" class="bigButton" onclick="saveScore()">Score speichern</button>

<div class="highscore">
<h2>🏆 Klassen Highscore</h2>
<div id="highscores"></div>
</div>

<button class="bigButton" onclick="location.reload()">Nochmal spielen</button>

</div>

<audio id="nachtigall" src="nachtigall.mp3"></audio> <audio id="amsel" src="amsel.mp3"></audio> <audio id="rotkehlchen" src="rotkehlchen.mp3"></audio> <audio id="halsbandsittich" src="halsbandsittich.mp3"></audio> <audio id="kanadagans" src="kanadagans.mp3"></audio> <audio id="kohlmeise" src="kohlmeise.mp3"></audio> <audio id="ringeltaube" src="ringeltaube.mp3"></audio> <audio id="star" src="star.mp3"></audio> <audio id="stockente" src="stockente.mp3"></audio> <audio id="turmfalke" src="turmfalke.mp3"></audio>

<script>

let birds=[
"nachtigall","amsel","rotkehlchen","halsbandsittich",
"kanadagans","kohlmeise","ringeltaube","star",
"stockente","turmfalke"
];

let currentBird="";
let points=0;
let rounds=0;
let maxRounds=15;
let usedBirds=[];
let mode="quiz";

function capitalize(t){
return t.charAt(0).toUpperCase()+t.slice(1);
}

function startGame(selectedMode){

mode=selectedMode;

document.getElementById("startScreen").style.display="none";
document.getElementById("game").style.display="block";

if(mode==="learn"){
document.getElementById("quizElements").style.display="none";
}else{
document.getElementById("quizElements").style.display="block";
}

createCards();

if(mode!=="learn") nextRound();

}

function goBack(){

stopAllSounds();

document.getElementById("game").style.display="none";
document.getElementById("startScreen").style.display="flex";

}

function createCards(){

let container=document.getElementById("birdContainer");
container.innerHTML="";

birds.forEach(b=>{

let name=capitalize(b);

if(mode==="expert"){

let btn=document.createElement("button");
btn.className="expertButton";
btn.innerText=name;
btn.onclick=()=>birdClicked(b,btn);

container.appendChild(btn);

}else{

let card=document.createElement("div");
card.className="card";

card.innerHTML="<img src='"+b+".jpg'><div class='name'>"+name+"</div>";

card.onclick=()=>birdClicked(b,card);

container.appendChild(card);

}

});

}

function stopAllSounds(){
document.querySelectorAll("audio").forEach(a=>{
a.pause();
a.currentTime=0;
});
}

function nextRound(){

stopAllSounds();

if(usedBirds.length>=8) usedBirds=[];

let available=birds.filter(b=>!usedBirds.includes(b));

currentBird=available[Math.floor(Math.random()*available.length)];

usedBirds.push(currentBird);

document.getElementById(currentBird).play();

}

function repeatSound(){
stopAllSounds();
document.getElementById(currentBird).play();
}

function birdClicked(bird,element){

if(mode==="learn"){
stopAllSounds();
document.getElementById(bird).play();
return;
}

stopAllSounds();

let all=document.querySelectorAll(".card,.expertButton");

all.forEach(el=>{
if(el.innerText.toLowerCase()===currentBird){
el.classList.add("correct");
}
});

if(bird===currentBird){

element.classList.add("correct");
points++;
document.getElementById("info").innerHTML="✅ Richtig!";

}else{

element.classList.add("wrong");

document.getElementById("info").innerHTML="❌ Falsch! Das war "+capitalize(currentBird);

if(mode==="quiz"){
document.getElementById("correctBirdImage").src=currentBird+".jpg";
document.getElementById("correctBirdName").innerHTML=capitalize(currentBird);
document.getElementById("correctBirdBox").style.display="block";
}

}

rounds++;

document.getElementById("points").innerHTML="Punkte: "+points+" / "+maxRounds;

document.getElementById("progressBar").style.width=(rounds/maxRounds*100)+"%";

setTimeout(()=>{

document.getElementById("correctBirdBox").style.display="none";

all.forEach(el=>{
el.classList.remove("correct");
el.classList.remove("wrong");
});

if(rounds>=maxRounds){
endGame();
}else{

document.getElementById("info").innerHTML="⏳ Nächster Vogelruf startet gleich...";

setTimeout(()=>{
document.getElementById("info").innerHTML="🔊 Höre den Vogelruf";
nextRound();
},2000);

}

},2000);

}

function endGame(){

document.getElementById("game").style.display="none";
document.getElementById("endScreen").style.display="flex";

document.getElementById("finalScore").innerHTML="🏆 "+points+" / "+maxRounds;

}

function saveScore(){

let name=document.getElementById("nameInput").value.trim();
if(!name) return;

let highscores=JSON.parse(localStorage.getItem("birdHighscores")||"[]");

highscores.push({name:name,score:points});

highscores.sort((a,b)=>b.score-a.score);

highscores=highscores.slice(0,10);

localStorage.setItem("birdHighscores",JSON.stringify(highscores));

displayHighscores();

}

function displayHighscores(){

let highscores=JSON.parse(localStorage.getItem("birdHighscores")||"[]");

let html="";

highscores.forEach((h,i)=>{

let medal=i==0?"🥇":i==1?"🥈":i==2?"🥉":"";

html+=medal+" "+h.name+" — "+h.score+" Punkte<br>";

});

document.getElementById("highscores").innerHTML=html;

}

</script>

</body>
</html>
