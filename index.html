<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vogelstimmen Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
:root {
  --green: #2ecc71;
  --green-dark: #1a8a48;
  --blue: #3498db;
  --blue-dark: #1f618d;
  --orange: #f39c12;
  --orange-dark: #d35400;
  --purple: #9b59b6;
  --purple-dark: #6c3483;
  --red: #e74c3c;
  --easy: #27ae60;
  --medium: #e67e22;
  --hard: #c0392b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: #1a1a2e;
  color: white;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── STARTSCREEN ── */
#startScreen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
  background-image: url("Startseite.png");
  background-size: cover;
  background-position: center;
  position: relative;
}
#startScreen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.45);
}
#startScreen > * { position: relative; z-index: 1; }

.startTitle {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 6vw, 64px);
  text-shadow: 0 4px 20px rgba(0,0,0,0.6);
  letter-spacing: 2px;
  margin-bottom: 10px;
}

.startButton {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(22px, 4vw, 42px);
  font-weight: 900;
  color: white;
  padding: clamp(16px,3vw,28px) clamp(40px,8vw,90px);
  border-radius: 20px;
  border: none;
  cursor: pointer;
  box-shadow: 0 8px 0 rgba(0,0,0,0.4), 0 14px 30px rgba(0,0,0,0.35);
  transition: transform .1s, box-shadow .1s;
  width: min(420px, 90vw);
  letter-spacing: 1px;
}
.startButton:active {
  transform: translateY(4px);
  box-shadow: 0 4px 0 rgba(0,0,0,0.4), 0 6px 15px rgba(0,0,0,0.35);
}
.learnBtn  { background: linear-gradient(135deg,#2ecc71,#1e8449); }
.quizBtn   { background: linear-gradient(135deg,#3498db,#1f618d); }
.expertBtn { background: linear-gradient(135deg,#f39c12,#d35400); }
.scoreBtn  { background: linear-gradient(135deg,#9b59b6,#6c3483); }

/* ── DIFFICULTY SCREEN ── */
#difficultyScreen {
  display: none;
  min-height: 100vh;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 24px;
  background: linear-gradient(135deg,#1a1a2e,#16213e);
  padding: 40px 20px;
}

.diffTitle {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px,5vw,52px);
  margin-bottom: 10px;
}

.diffBtn {
  width: min(420px, 90vw);
  padding: 28px 40px;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-weight: 900;
  color: white;
  font-size: clamp(22px,3.5vw,36px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  box-shadow: 0 8px 0 rgba(0,0,0,0.35), 0 14px 30px rgba(0,0,0,0.3);
  transition: transform .1s, box-shadow .1s;
}
.diffBtn:active { transform: translateY(4px); box-shadow: 0 4px 0 rgba(0,0,0,0.35); }
.diffBtn small {
  font-size: clamp(13px,2vw,18px);
  font-weight: 400;
  opacity: 0.88;
}
.easyBtn   { background: linear-gradient(135deg,#27ae60,#1e8449); }
.mediumBtn { background: linear-gradient(135deg,#e67e22,#ca6f1e); }
.hardBtn   { background: linear-gradient(135deg,#c0392b,#922b21); }

.backBtnSmall {
  margin-top: 10px;
  background: rgba(255,255,255,0.12);
  border: 2px solid rgba(255,255,255,0.25);
  color: white;
  font-family: 'Nunito', sans-serif;
  font-size: 20px;
  padding: 12px 30px;
  border-radius: 12px;
  cursor: pointer;
  transition: background .2s;
}
.backBtnSmall:hover { background: rgba(255,255,255,0.22); }

/* ── GAME ── */
#game {
  display: none;
  padding: 16px 12px 40px;
  max-width: 900px;
  margin: 0 auto;
}

.topBar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 10px;
}

.bigButton {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(16px,2.5vw,24px);
  padding: 12px 28px;
  border-radius: 14px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
  cursor: pointer;
  font-weight: 700;
  transition: background .2s;
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.2);
}
.bigButton:hover { background: rgba(255,255,255,0.25); }

#diffBadge {
  font-size: clamp(15px,2vw,22px);
  font-weight: 900;
  padding: 8px 22px;
  border-radius: 30px;
  letter-spacing: 1px;
}
.badge-easy   { background: var(--easy); }
.badge-medium { background: var(--medium); }
.badge-hard   { background: var(--hard); }

#points {
  font-size: clamp(22px,4vw,44px);
  font-weight: 900;
  text-align: center;
  margin: 10px 0;
}

/* TIMER */
#timerWrap {
  display: none;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin: 8px 0;
}
#timerCircle {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: conic-gradient(var(--hard) 0deg, rgba(255,255,255,0.1) 0deg);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900;
  transition: background .3s;
}

.progressContainer {
  width: 100%;
  height: 18px;
  background: rgba(255,255,255,0.12);
  border-radius: 30px;
  margin: 12px 0;
  overflow: hidden;
}
.progressBar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  border-radius: 30px;
  transition: width .4s ease;
}

.repeatBtn {
  display: block;
  margin: 12px auto;
  font-size: clamp(16px,2.5vw,24px);
  padding: 12px 30px;
  border-radius: 14px;
  border: none;
  background: linear-gradient(135deg,#2c3e50,#34495e);
  color: white;
  cursor: pointer;
  font-weight: 700;
  font-family: 'Nunito', sans-serif;
  box-shadow: 0 4px 0 rgba(0,0,0,0.3);
  transition: transform .1s, box-shadow .1s;
}
.repeatBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.3); }

/* CORRECT BIRD BOX */
#correctBirdBox {
  display: none;
  background: rgba(231,76,60,0.15);
  border: 2px solid var(--red);
  border-radius: 18px;
  padding: 16px;
  margin: 12px 0;
  text-align: center;
  animation: fadeIn .3s;
}
#correctBirdBox img { width: 160px; border-radius: 12px; }
#correctBirdName { font-size: 22px; font-weight: 900; margin-top: 8px; }

@keyframes fadeIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }

/* CARDS */
.container {
  display: grid;
  gap: clamp(12px,2vw,22px);
  width: 100%;
  margin-top: 14px;
}
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(2, 1fr); }
.grid-5 { grid-template-columns: repeat(3, 1fr); }
.grid-all { grid-template-columns: repeat(2, 1fr); }

@media(max-width:600px){
  .grid-3,.grid-5,.grid-all { grid-template-columns: 1fr 1fr; }
}

.card {
  background: rgba(255,255,255,0.08);
  border: 2px solid rgba(255,255,255,0.12);
  padding: 14px;
  border-radius: 18px;
  cursor: pointer;
  transition: transform .15s, background .2s, border-color .2s;
  backdrop-filter: blur(6px);
}
.card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.3); }
.card img {
  width: 100%;
  height: clamp(100px,18vw,160px);
  object-fit: contain;
  border-radius: 10px;
}
.name {
  font-size: clamp(14px,2vw,22px);
  font-weight: 900;
  margin-top: 8px;
  text-align: center;
}

.expertButton {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(16px,2.5vw,26px);
  font-weight: 900;
  padding: clamp(18px,3vw,30px);
  border-radius: 16px;
  border: 2px solid rgba(255,255,255,0.2);
  background: rgba(230,126,34,0.25);
  color: white;
  cursor: pointer;
  transition: background .2s, transform .1s;
}
.expertButton:hover { background: rgba(230,126,34,0.45); transform: scale(1.03); }

.correct { background: rgba(46,204,113,0.35) !important; border-color: #2ecc71 !important; color: white; }
.wrong   { background: rgba(231,76,60,0.35)  !important; border-color: #e74c3c !important; color: white; }

/* ── HIGHSCORE SCREEN ── */
#highscoreScreen {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  padding: 30px;
  z-index: 100;
}
#highscoreList {
  font-size: clamp(18px,3vw,30px);
  margin: 20px 0;
  line-height: 1.8;
  text-align: center;
}

/* ── ENDSCREEN ── */
#endScreen {
  display: none;
  position: fixed; inset: 0;
  background-image: url("Startseite.png");
  background-size: cover;
  background-position: center;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 90;
}
#endScreen::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.6);
}
#endScreen > * { position: relative; z-index: 1; }

.endBox {
  background: rgba(0,0,0,0.75);
  padding: clamp(24px,5vw,50px);
  border-radius: 28px;
  width: min(520px, 92vw);
  text-align: center;
  border: 1px solid rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
}
#finalScore { font-size: clamp(50px,10vw,80px); margin: 12px 0; }
.endBox h2  { font-family:'Playfair Display',serif; font-size: clamp(22px,4vw,38px); }

#nameInput {
  font-family: 'Nunito', sans-serif;
  font-size: clamp(18px,2.5vw,26px);
  padding: 12px 20px;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
  color: white;
  margin: 16px 0 10px;
  width: 80%;
  text-align: center;
}
#nameInput::placeholder { color: rgba(255,255,255,0.5); }

#highscoreEnd { margin-top: 16px; font-size: clamp(15px,2.5vw,24px); line-height: 1.7; }

.endBtns { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; align-items: center; }
.endBtns .bigButton { width: 80%; font-size: clamp(16px,2.5vw,24px); }
</style>
</head>
<body>

<!-- ══════════════ STARTSCREEN ══════════════ -->
<div id="startScreen">
  <div class="startTitle">🐦 Vogelstimmen Trainer</div>
  <button class="startButton learnBtn"  onclick="startLearn()">Lernen</button>
  <button class="startButton quizBtn"   onclick="chooseDifficulty('quiz')">Quiz</button>
  <button class="startButton expertBtn" onclick="chooseDifficulty('expert')">Expertenmodus</button>
  <button class="startButton scoreBtn"  onclick="showHighscores()">🏆 Highscore</button>
</div>

<!-- ══════════════ DIFFICULTY SCREEN ══════════════ -->
<div id="difficultyScreen">
  <div class="diffTitle">🎯 Schwierigkeitsgrad</div>
  <button class="diffBtn easyBtn"   onclick="startGame(pendingMode,'easy')">
    🟢 Leicht
    <small>3 Antwortmöglichkeiten · 15 Runden</small>
  </button>
  <button class="diffBtn mediumBtn" onclick="startGame(pendingMode,'medium')">
    🟡 Mittel
    <small>5 Antwortmöglichkeiten · 15 Runden</small>
  </button>
  <button class="diffBtn hardBtn"   onclick="startGame(pendingMode,'hard')">
    🔴 Schwer
    <small>Alle Vögel · Zeitdruck · 15 Runden</small>
  </button>
  <button class="backBtnSmall" onclick="showStart()">⬅ Zurück</button>
</div>

<!-- ══════════════ HIGHSCORE ══════════════ -->
<div id="highscoreScreen">
  <h1>🏆 Klassen Highscore</h1>
  <div id="highscoreList">Lade Highscore...</div>
  <button class="bigButton" onclick="closeHighscores()">Schließen</button>
</div>

<!-- ══════════════ GAME ══════════════ -->
<div id="game">
  <div class="topBar">
    <button class="bigButton" onclick="goBack()">⬅ Zurück</button>
    <div id="diffBadge"></div>
    <button class="bigButton" onclick="showHighscores()">🏆</button>
  </div>

  <div id="points">Punkte: 0 / 15</div>

  <div class="progressContainer">
    <div class="progressBar" id="progressBar"></div>
  </div>

  <!-- Timer (nur Schwer) -->
  <div id="timerWrap">
    <div id="timerCircle">10</div>
    <span id="timerLabel" style="font-size:18px;opacity:.7">Sekunden</span>
  </div>

  <button class="repeatBtn" onclick="repeatSound()">🔁 Vogelruf wiederholen</button>

  <div id="correctBirdBox">
    <img id="correctBirdImage">
    <div id="correctBirdName"></div>
  </div>

  <div class="container" id="birdContainer"></div>
</div>

<!-- ══════════════ ENDSCREEN ══════════════ -->
<div id="endScreen">
  <div class="endBox">
    <h2>Dein Ergebnis</h2>
    <div id="finalScore"></div>
    <input id="nameInput" placeholder="Dein Name">
    <div class="endBtns">
      <button class="bigButton" onclick="saveScore()" id="saveButton">Score speichern</button>
      <div id="highscoreEnd"></div>
      <button class="bigButton" onclick="location.reload()">🔄 Nochmal spielen</button>
    </div>
  </div>
</div>

<!-- ══════════════ AUDIO ══════════════ -->
<!-- Hier alle Vogelrufe als Audio-Tags -->
<div id="audioContainer" style="display:none"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  🐦 VOGEL-DATENBANK – hier einfach neue Vögel hinzufügen!
//
//  Format pro Vogel:
//  { id: "dateiname", name: "Anzeigename", schwer: true/false }
//
//  Dateien müssen im gleichen Ordner liegen:
//    dateiname.mp3  (Vogelruf)
//    dateiname.jpg  (Vogelbild)
//
//  schwer: true  → Vogel erscheint nur bei Schwierigkeitsgrad "Schwer"
//  schwer: false → Vogel erscheint bei allen Schwierigkeitsgraden
// ═══════════════════════════════════════════════════════════════
const BIRDS = [
  { id: "amsel",          name: "Amsel",          schwer: false },
  { id: "rotkehlchen",    name: "Rotkehlchen",    schwer: false },
  { id: "kohlmeise",      name: "Kohlmeise",      schwer: false },
  { id: "ringeltaube",    name: "Ringeltaube",    schwer: false },
  { id: "stockente",      name: "Stockente",      schwer: false },
  { id: "nachtigall",     name: "Nachtigall",     schwer: false },
  { id: "halsbandsittich",name: "Halsbandsittich",schwer: true  },
  { id: "kanadagans",     name: "Kanadagans",     schwer: true  },
  { id: "star",           name: "Star",           schwer: true  },
  { id: "turmfalke",      name: "Turmfalke",      schwer: true  },
  // ── Hier neue Vögel hinzufügen ──
  // { id: "buchfink",    name: "Buchfink",        schwer: false },
  // { id: "zilpzalp",   name: "Zilpzalp",        schwer: false },
];

// ═══════════════════════════════════════════════════════════════
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxpeHmvAqfvavf0ErpkFtBkHAqPFHnN7o4vEPw34IJYSKCNInvwwc4R0A8O2urvzt07rQ/exec";

// Konfiguration pro Schwierigkeitsgrad
const DIFFICULTY_CONFIG = {
  easy:   { label: "🟢 Leicht", optionCount: 3, useAll: false, timer: false, maxRounds: 15 },
  medium: { label: "🟡 Mittel", optionCount: 5, useAll: false, timer: false, maxRounds: 15 },
  hard:   { label: "🔴 Schwer", optionCount: 99,useAll: true,  timer: true,  maxRounds: 15, timerSec: 8 },
};

let mode = "quiz";
let difficulty = "medium";
let pendingMode = "quiz";
let currentBird = null;
let points = 0;
let rounds = 0;
let maxRounds = 15;
let scoreSaved = false;
let timerInterval = null;
let timerValue = 0;
let activeBirds = [];   // Vögel die in dieser Runde verfügbar sind
let optionBirds = [];   // Optionen für die aktuelle Frage

// Audio dynamisch erzeugen
function buildAudio() {
  const container = document.getElementById("audioContainer");
  container.innerHTML = "";
  BIRDS.forEach(b => {
    const a = document.createElement("audio");
    a.id = "audio_" + b.id;
    a.src = b.id + ".mp3";
    container.appendChild(a);
  });
}
buildAudio();

function showStart() {
  document.getElementById("difficultyScreen").style.display = "none";
  document.getElementById("startScreen").style.display = "flex";
}

function chooseDifficulty(m) {
  pendingMode = m;
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("difficultyScreen").style.display = "flex";
}

function startLearn() {
  mode = "learn";
  difficulty = "easy";
  activeBirds = BIRDS;
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("game").style.display = "block";
  const badge = document.getElementById("diffBadge");
  badge.textContent = "📚 Lernen";
  badge.className = "diffBadge badge-easy";
  document.getElementById("timerWrap").style.display = "none";
  createCards(BIRDS);
}

function startGame(m, diff) {
  mode = m;
  difficulty = diff;
  points = 0;
  rounds = 0;
  scoreSaved = false;
  const cfg = DIFFICULTY_CONFIG[diff];
  maxRounds = cfg.maxRounds;

  // Vögel auswählen
  activeBirds = cfg.useAll ? BIRDS : BIRDS.filter(b => !b.schwer);
  if (activeBirds.length < 3) activeBirds = BIRDS; // Fallback

  document.getElementById("difficultyScreen").style.display = "none";
  document.getElementById("game").style.display = "block";

  const badge = document.getElementById("diffBadge");
  badge.textContent = cfg.label;
  badge.className = "diffBadge badge-" + diff;

  if (cfg.timer) {
    document.getElementById("timerWrap").style.display = "flex";
  } else {
    document.getElementById("timerWrap").style.display = "none";
  }

  document.getElementById("points").innerHTML = "Punkte: 0 / " + maxRounds;
  document.getElementById("progressBar").style.width = "0%";

  nextRound();
}

function goBack() {
  stopAllSounds();
  clearTimer();
  document.getElementById("game").style.display = "none";
  document.getElementById("correctBirdBox").style.display = "none";
  showStart();
}

// ── KARTEN ERSTELLEN ──
function createCards(birdsToShow) {
  const container = document.getElementById("birdContainer");
  container.innerHTML = "";

  // Grid-Klasse je nach Anzahl
  const n = birdsToShow.length;
  container.className = "container";
  if (n <= 3) container.classList.add("grid-3");
  else if (n <= 4) container.classList.add("grid-4");
  else if (n <= 5) container.classList.add("grid-5");
  else container.classList.add("grid-all");

  birdsToShow.forEach(b => {
    if (mode === "expert") {
      const btn = document.createElement("button");
      btn.className = "expertButton";
      btn.innerText = b.name;
      btn.onclick = () => birdClicked(b, btn);
      container.appendChild(btn);
    } else {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<img src="${b.id}.jpg" alt="${b.name}"><div class="name">${b.name}</div>`;
      card.onclick = () => birdClicked(b, card);
      container.appendChild(card);
    }
  });
}

// ── RUNDE ──
function nextRound() {
  stopAllSounds();
  clearTimer();

  document.getElementById("correctBirdBox").style.display = "none";
  document.querySelectorAll(".card,.expertButton").forEach(el => {
    el.classList.remove("correct","wrong");
    el.style.pointerEvents = "";
  });

  // Zufälligen Vogel wählen
  currentBird = activeBirds[Math.floor(Math.random() * activeBirds.length)];

  // Optionen zusammenstellen
  const cfg = DIFFICULTY_CONFIG[difficulty];
  const count = Math.min(cfg.optionCount, activeBirds.length);

  let pool = [...activeBirds].filter(b => b.id !== currentBird.id);
  shuffle(pool);
  optionBirds = pool.slice(0, count - 1);
  optionBirds.push(currentBird);
  shuffle(optionBirds);

  createCards(optionBirds);

  document.getElementById(currentBird.id + "_audio") // Fallback
  const audio = document.getElementById("audio_" + currentBird.id);
  if (audio) audio.play();

  if (cfg.timer) startTimer(cfg.timerSec);
}

function repeatSound() {
  stopAllSounds();
  const audio = document.getElementById("audio_" + (currentBird ? currentBird.id : ""));
  if (audio) audio.play();
}

function stopAllSounds() {
  document.querySelectorAll("audio").forEach(a => { a.pause(); a.currentTime = 0; });
}

// ── ANTWORT ──
function birdClicked(bird, element) {
  if (mode === "learn") {
    stopAllSounds();
    const a = document.getElementById("audio_" + bird.id);
    if (a) a.play();
    return;
  }

  stopAllSounds();
  clearTimer();

  // Alle Klicks sperren
  document.querySelectorAll(".card,.expertButton").forEach(el => el.style.pointerEvents = "none");

  if (bird.id === currentBird.id) {
    element.classList.add("correct");
    points++;
  } else {
    element.classList.add("wrong");
    // Richtigen Vogel markieren
    document.querySelectorAll(".card,.expertButton").forEach(el => {
      const n = el.querySelector(".name") || el;
      const txt = (n.innerText || n.textContent).trim();
      if (txt === currentBird.name) el.classList.add("correct");
    });
    document.getElementById("correctBirdImage").src = currentBird.id + ".jpg";
    document.getElementById("correctBirdName").textContent = currentBird.name;
    document.getElementById("correctBirdBox").style.display = "block";
  }

  rounds++;
  document.getElementById("points").innerHTML = "Punkte: " + points + " / " + maxRounds;
  document.getElementById("progressBar").style.width = (rounds / maxRounds * 100) + "%";

  setTimeout(() => {
    if (rounds >= maxRounds) endGame();
    else nextRound();
  }, 1600);
}

// ── TIMER (Schwer) ──
function startTimer(sec) {
  timerValue = sec;
  const circle = document.getElementById("timerCircle");
  updateTimerDisplay(timerValue, sec);

  timerInterval = setInterval(() => {
    timerValue--;
    updateTimerDisplay(timerValue, sec);
    if (timerValue <= 0) {
      clearTimer();
      // Zeit abgelaufen → falsch werten
      timeOut();
    }
  }, 1000);
}

function updateTimerDisplay(val, max) {
  const circle = document.getElementById("timerCircle");
  const pct = (val / max) * 360;
  const color = val <= 3 ? "#e74c3c" : val <= 5 ? "#f39c12" : "#c0392b";
  circle.style.background = `conic-gradient(${color} ${pct}deg, rgba(255,255,255,0.1) ${pct}deg)`;
  circle.textContent = val;
}

function clearTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function timeOut() {
  stopAllSounds();
  document.querySelectorAll(".card,.expertButton").forEach(el => el.style.pointerEvents = "none");
  document.getElementById("correctBirdImage").src = currentBird.id + ".jpg";
  document.getElementById("correctBirdName").textContent = "⏱ Zeit! → " + currentBird.name;
  document.getElementById("correctBirdBox").style.display = "block";

  rounds++;
  document.getElementById("points").innerHTML = "Punkte: " + points + " / " + maxRounds;
  document.getElementById("progressBar").style.width = (rounds / maxRounds * 100) + "%";

  setTimeout(() => {
    if (rounds >= maxRounds) endGame();
    else nextRound();
  }, 1800);
}

// ── ENDE ──
function endGame() {
  document.getElementById("game").style.display = "none";
  document.getElementById("endScreen").style.display = "flex";
  const pct = Math.round(points / maxRounds * 100);
  const emoji = pct >= 80 ? "🏆" : pct >= 60 ? "🎉" : pct >= 40 ? "👍" : "💪";
  document.getElementById("finalScore").innerHTML = emoji + " " + points + " / " + maxRounds;
  loadHighscoreEnd();
}

function saveScore() {
  if (scoreSaved) return;
  const name = document.getElementById("nameInput").value.trim();
  if (!name) { document.getElementById("nameInput").style.borderColor="#e74c3c"; return; }
  scoreSaved = true;
  const diffLabel = DIFFICULTY_CONFIG[difficulty]?.label || "";
  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({ name: name + " " + diffLabel, score: points })
  });
  document.getElementById("saveButton").textContent = "Gespeichert ✔";
  document.getElementById("saveButton").style.background = "rgba(46,204,113,0.4)";
  setTimeout(loadHighscoreEnd, 900);
}

function loadHighscoreEnd() {
  fetch(SCRIPT_URL).then(r => r.json()).then(data => {
    let html = "<b>🏆 Top-Scores</b><br>";
    data.slice(0, 5).forEach((h, i) => {
      const m = i===0?"🥇":i===1?"🥈":i===2?"🥉":"  ";
      html += m + " " + h[0] + " — " + h[1] + " Pkt<br>";
    });
    document.getElementById("highscoreEnd").innerHTML = html;
  });
}

function showHighscores() {
  document.getElementById("highscoreScreen").style.display = "flex";
  fetch(SCRIPT_URL).then(r => r.json()).then(data => {
    let html = "";
    data.forEach((h, i) => {
      const m = i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
      html += m + " " + h[0] + " — " + h[1] + " Punkte<br>";
    });
    document.getElementById("highscoreList").innerHTML = html;
  });
}

function closeHighscores() {
  document.getElementById("highscoreScreen").style.display = "none";
}

// ── UTILS ──
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}
</script>
